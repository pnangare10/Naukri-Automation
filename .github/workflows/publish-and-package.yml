name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_version:
        description: "Optional: rollback GitHub release/tag version (example: 2.12.29)"
        required: false
        type: string

concurrency:
  group: publish-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: github.event.inputs.rollback_version == '' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes"

          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true

  build-windows-exe:
    needs: publish
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install pkg
        run: npm install -g pkg

      - name: Build Windows EXE
        run: npm run pkg

      - name: Verify generated files
        run: dir

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          files: naukri-ninja.exe

  rollback:
    if: github.event.inputs.rollback_version != ''
    runs-on: ubuntu-latest

    steps:
      - name: Delete GitHub Release and Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.rollback_version }}
          gh release delete v$VERSION -y || true
          git push --delete origin v$VERSION || true
          echo "Rollback completed for v$VERSION"
